    <!-- GSAP Animation Library để làm hiệu ứng tàu chạy mượt mà -->

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            /* Nền rực rỡ, vui tươi */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        .title-font {
            font-family: 'Dancing Script', cursive;
        }
        /* Style cho thư (Modal) */
        .envelope {
            background-image: repeating-linear-gradient(45deg, #ff7675 0, #ff7675 10px, transparent 10px, transparent 20px, #74b9ff 20px, #74b9ff 30px, transparent 30px, transparent 40px);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        .envelope-inner {
            background-color: #fffaf0;
            border-radius: 8px;
        }
        .stamp {
            border: 2px dashed #ccc;
            padding: 4px;
            transform: rotate(15deg);
        }
        /* Hiệu ứng nhún nhảy cho các điểm dừng */
        .station-node {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            z-index: 10;
        }
        .station-node:hover {
            transform: scale(1.15) translateY(-5px);
        }
        /* Khung hiển thị bản đồ phải đủ rộng để chứa 7 hàng ngang không bị ép lại */
        .map-container {
            min-width: 900px; /* Ép độ rộng để luôn giữ 7 cột đẹp mắt */
            padding-bottom: 100px;
        }
        
        /* Đoàn tàu */
        #the-train {
            position: absolute;
            font-size: 2.5rem;
            z-index: 20;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Không cản trở click */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }

        /* Tùy chỉnh thanh cuộn chung và cho modal */
        ::-webkit-scrollbar, .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 6px;
        }
        ::-webkit-scrollbar-track, .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.5); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb, .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ff7675; 
            border-radius: 4px;
        }

        /* Hiệu ứng trái tim rơi */
        .heart {
            position: absolute;
            top: -10vh;
            font-size: 1.5rem;
            animation: fall linear forwards;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

            const container = document.getElementById('hearts-container');
            const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '✨', '🌸'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                // Vị trí ngẫu nhiên theo chiều ngang
                heart.style.left = Math.random() * 100 + 'vw';
                // Tốc độ rơi ngẫu nhiên từ 4s đến 8s
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                // Kích thước ngẫu nhiên
                heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                
                container.appendChild(heart);
                
                // Tự động xoá trái tim sau khi rơi xong để không làm nặng web
                setTimeout(() => {
                    heart.remove();
                }, 8000);
            }, 300); // Mỗi 300ms tạo ra 1 trái tim
        }

        // --- 2. RENDER GIAO DIỆN BẢN ĐỒ ---
        const gridContainer = document.getElementById('grid-container');
        const CHUNK_SIZE = 7; // 7 người / 1 hàng theo yêu cầu
        
        const rows = [];
        for (let i = 0; i < journeyData.length; i += CHUNK_SIZE) {
            rows.push(journeyData.slice(i, i + CHUNK_SIZE));
        }

        // Render từng hàng
        rows.forEach((row, rowIndex) => {
            const rowDiv = document.createElement('div');
            const isReverse = rowIndex % 2 !== 0; // Hàng lẻ sẽ xếp ngược để tạo Zic-Zắc
            
            // Thêm py-8 để giãn cách hàng cho đường ray đẹp hơn
            rowDiv.className = `flex ${isReverse ? 'flex-row-reverse' : 'flex-row'} justify-around items-center w-full px-4 py-8`;
            
            row.forEach(item => {
                const nodeHTML = `
                    <div class="station-node flex flex-col items-center w-24 md:w-32 group cursor-pointer" data-id="${item.id}" onclick="openLetter(${item.id})">
                        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 flex items-center justify-center text-3xl md:text-4xl transition-all duration-300 ${item.color} group-hover:scale-110 group-hover:ring-4 ring-white shadow-lg">
                            ${item.icon}
                        </div>
                        <div class="mt-2 bg-white/90 backdrop-blur rounded px-2 py-1 text-center shadow border border-gray-100 min-w-[90px]">
                            <p class="text-xs md:text-sm font-bold text-gray-800 leading-tight">${item.name}</p>
                            <p class="text-[10px] md:text-xs text-red-600 font-semibold mt-0.5">${item.subtitle}</p>
                        </div>
                    </div>
                `;
                rowDiv.insertAdjacentHTML('beforeend', nodeHTML);
            });
            
            gridContainer.appendChild(rowDiv);
        });

        // --- 3. VẼ ĐƯỜNG RAY (SVG) & HIỆU ỨNG TÀU ---
        let pathCoordinates = [];

        function drawTrack() {
            const nodes = document.querySelectorAll('.station-node');
            const svg = document.getElementById('track-svg');
            const mapArea = document.getElementById('map-area');
            
            if(!svg || !mapArea) return;

            svg.setAttribute('width', mapArea.scrollWidth);
            svg.setAttribute('height', mapArea.scrollHeight);
            
            let pointsString = "";
            pathCoordinates = []; 

            nodes.forEach(node => {
                const iconDiv = node.querySelector('div.rounded-full');
                const rect = iconDiv.getBoundingClientRect();
                const containerRect = mapArea.getBoundingClientRect();
                
                const x = (rect.left - containerRect.left) + rect.width / 2;
                const y = (rect.top - containerRect.top) + rect.height / 2;
                
                pointsString += `${x},${y} `;
                pathCoordinates.push({x, y});
            });

            svg.innerHTML = `
                <polyline 
                    points="${pointsString}" 
                    fill="none" 
                    stroke="#576574" 
                    stroke-width="6" 
                    stroke-dasharray="15, 10" 
                    stroke-linecap="round" 
                    stroke-linejoin="round"
                    style="opacity: 0.6; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2));"
                />
            `;
            
            animateTrain();
        }

        function animateTrain() {
            if(pathCoordinates.length === 0) return;
            
            const train = document.getElementById('the-train');
            if(!train) return;

            gsap.killTweensOf(train);
            // Căn giữa tâm tàu vào tọa độ x, y
            gsap.set(train, { x: pathCoordinates[0].x, y: pathCoordinates[0].y, xPercent: -50, yPercent: -50 });

            const tl = gsap.timeline({ repeat: -1 }); 
            const durationPerPoint = 1.5;

            for (let i = 1; i < pathCoordinates.length; i++) {
                const p1 = pathCoordinates[i-1];
                const p2 = pathCoordinates[i];
                
                const isGoingLeft = p2.x < p1.x - 5; 
                
                if (isGoingLeft) {
                    tl.to(train, { scaleX: -1, duration: 0.1 }, "-=0.1");
                } else {
                    tl.to(train, { scaleX: 1, duration: 0.1 }, "-=0.1");
                }
                
                tl.to(train, {
                    x: p2.x,
                    y: p2.y,
                    duration: durationPerPoint,
                    ease: "power1.inOut"
                });
            }
            tl.to({}, {duration: 3});
        }

        window.addEventListener('load', () => {
            setTimeout(drawTrack, 800);
        });
        
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(drawTrack, 300);
        });


        // --- 4. TƯƠNG TÁC MODAL (THƯ RỘNG & 2 CỘT ẢNH) ---
const modal = document.getElementById('letter-modal');
const modalContent = document.getElementById('modal-content');
function openLetter(id) {
    const data = journeyData.find(item => item.id === id);
    if (!data) return;

    // 1. Modal tràn màn hình (Full Screen)
    // Sử dụng w-full h-full để bì thư mở ra chiếm trọn thiết bị
    modalContent.className = "relative bg-[#fdfbf7] w-full h-full md:h-[95vh] md:w-[95%] md:max-w-6xl md:rounded-[2rem] shadow-2xl overflow-y-auto transform transition-all duration-500 flex flex-col p-4 md:p-10";

    // Header nội dung
    document.getElementById('modal-name').innerText = data.name;
    document.getElementById('modal-role').innerText = `📍 ${data.subtitle}`;
    document.getElementById('modal-message').innerText = data.message;

    // 2. Xử lý Container ảnh
    const imageContainer = document.getElementById('modal-image-container');
    imageContainer.innerHTML = '';
    
    // Sử dụng flex-wrap hoặc grid tùy vào số lượng ảnh, ở đây ưu tiên 2 cột
    imageContainer.className = "grid grid-cols-1 md:grid-cols-2 gap-6 items-start mb-8";
    
    data.images.forEach(img => {
        imageContainer.innerHTML += `
            <div class="flex flex-col items-center group w-full">
                <div class="relative w-full max-w-full bg-white p-2 shadow-lg border border-gray-100 transform rotate-1 group-even:-rotate-1 transition-all duration-500 hover:rotate-0 hover:scale-[1.02]">
                    <img src="${img.src}" alt="${img.caption}" 
                         onerror="this.src='https://via.placeholder.com/600x450?text=Kỷ+Yếu'"
                         class="w-full h-auto max-h-[60vh] object-contain rounded-sm">
                    
                    <p class="mt-3 text-center font-handwriting text-gray-700 italic text-sm md:text-base border-t pt-2 border-dashed border-gray-200">
                        ${img.caption}
                    </p>
                </div>
            </div>
        `;
    });

    // 3. Hiệu ứng màu nền bì thư (Background tràn viền)
    if (data.type === 'teacher') {
        modalContent.style.borderTop = "10px solid #ff9a9e";
    } else if (data.type === 'school') {
        modalContent.style.borderTop = "10px solid #84fab0";
    } else {
        modalContent.style.borderTop = "10px solid #74b9ff";
    }

    // Hiển thị modal
    modal.classList.remove('hidden');
    // Đảm bảo modal cha (overlay) cũng full màn hình
    modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300";
    
    setTimeout(() => {
        modal.classList.remove('opacity-0');
        modalContent.classList.remove('scale-95', 'opacity-0');
        modalContent.classList.add('scale-100', 'opacity-100');
    }, 50);
}
function closeModal() {
    modal.classList.add('opacity-0');
    modalContent.classList.remove('scale-100', 'opacity-100');
    modalContent.classList.add('scale-95', 'opacity-0');
    setTimeout(() => {
        modal.classList.add('hidden');
    }, 300);
}

modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
});

        // --- 5. ĐIỀU KHIỂN NHẠC ---
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if(isPlaying) {
                bgMusic.pause();
                iconPause.classList.add('hidden');
                iconPlay.classList.remove('hidden');
            } else {
                bgMusic.play();
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            }
            isPlaying = !isPlaying;
        });

    </script>
